<div class="modal fade" id="modalRepetirEstudiante" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Repetir grado</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="idEstudianteRepetir">

        <p class="mb-3">
          ¿Desea marcar al estudiante como <strong>reprobado</strong> y repetir el grado?
        </p>

        <div class="mb-3">
          <label class="form-label fw-bold">Grado actual</label>
          <div id="gradoActualRepetir"></div>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button id="btnConfirmarRepetir" class="btn btn-warning">Repetir grado</button>
      </div>

    </div>
  </div>
</div>
