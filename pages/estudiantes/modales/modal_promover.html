<div class="modal fade" id="modalPromoverEstudiante" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Promover estudiante</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="idEstudiantePromover">

        <p class="mb-3">
          ¿Desea promover al estudiante al siguiente grado?
        </p>

        <div class="mb-3">
          <label class="form-label fw-bold">Grado actual</label>
          <div id="gradoActualPromover"></div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Grado siguiente</label>
          <div id="gradoSiguientePromover"></div>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button id="btnConfirmarPromover" class="btn btn-success">Promover</button>
      </div>

    </div>
  </div>
</div>
