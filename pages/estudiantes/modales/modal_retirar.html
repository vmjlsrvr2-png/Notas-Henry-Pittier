<div class="modal fade" id="modalRetirarEstudiante" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Retirar estudiante</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input type="hidden" id="idEstudianteRetirar">

        <p class="mb-3">
          ¿Está seguro de que desea <strong>retirar</strong> al estudiante de la institución?
        </p>

        <div class="mb-3">
          <label class="form-label fw-bold">Motivo del retiro</label>
          <textarea id="motivoRetiro" class="form-control" rows="3"></textarea>
        </div>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button id="btnConfirmarRetirar" class="btn btn-danger">Retirar estudiante</button>
      </div>

    </div>
  </div>
</div>
