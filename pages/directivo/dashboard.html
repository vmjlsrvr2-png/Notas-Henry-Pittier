<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directivo Dashboard - NOTAS Henry Pittier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../../css/styles.css" rel="stylesheet">
  <style>
    :root {
      --primary-color: #0056b3;
      --secondary-color: #6c757d;
    }

    body {
      background-color: #f5f7fa;
    }

    .navbar-custom {
      background: linear-gradient(135deg, var(--primary-color) 0%, #003d82 100%);
    }

    .sidebar {
      background-color: #fff;
      border-right: 1px solid #e9ecef;
      position: sticky;
      top: 56px;
      min-height: calc(100vh - 56px);
    }

    .nav-item a {
      border-left: 3px solid transparent;
      padding: 12px 16px;
    }

    .nav-item a:hover,
    .nav-item a.active {
      background-color: #f8f9fa;
      border-left-color: var(--primary-color);
      color: var(--primary-color);
    }

    .main-content {
      padding: 30px;
    }

    .stat-card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
      border-left: 4px solid var(--primary-color);
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary-color);
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="javascript:location.reload()">
        <i class="bi bi-mortarboard"></i> Directivo | NOTAS
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="javascript:nav.irAPerfil()">
              <i class="bi bi-person-circle"></i> Mi Perfil
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="javascript:nav.logout()">
              <i class="bi bi-box-arrow-right"></i> Salir
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid" style="margin-top: 56px;">
    <div class="row g-0">
      <!-- SIDEBAR -->
      <div class="col-md-3 d-none d-md-block">
        <div class="sidebar">
          <div class="p-3 border-bottom">
            <div style="display: flex; gap: 10px; align-items: center;">
              <div style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary-color), #003d82); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;" id="userInitials">D</div>
              <div>
                <div style="font-weight: 600; font-size: 0.9rem;" id="userName">Directivo</div>
                <small class="text-muted" id="userEmail">director@ejemplo.com</small>
              </div>
            </div>
          </div>
          <nav class="nav flex-column">
            <a class="nav-item nav-link active" href="javascript:cargarSeccion('inicio')">
              <i class="bi bi-speedometer2"></i> Panel Principal
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('personal')">
              <i class="bi bi-people"></i> Gestión de Personal
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('periodos')">
              <i class="bi bi-calendar-event"></i> Períodos Académicos
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('secciones')">
              <i class="bi bi-building"></i> Secciones
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('estudiantes')">
              <i class="bi bi-person-badge"></i> Estudiantes
            </a>
          </nav>
        </div>
      </div>

      <!-- MAIN CONTENT -->
      <div class="col-md-9">
        <div class="main-content">
          <div id="contentArea">
            <!-- Contenido dinámico -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/services/session.js"></script>
  <script src="../../js/services/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!sessionAPI.estaAutenticado()) {
        window.location.href = '/index.html';
        return;
      }

      const rol = sessionAPI.obtenerRolPrincipal();
      if (rol !== 'Directivo') {
        window.location.href = '/index.html';
        return;
      }

      const usuario = sessionAPI.obtenerUsuario();
      document.getElementById('userName').textContent = `${usuario.nombre} ${usuario.apellido}`;
      document.getElementById('userEmail').textContent = usuario.email;

      cargarSeccion('inicio');
    });

    async function cargarSeccion(seccion) {
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
      });
      const activeLink = document.querySelector(`.nav-item[href*="${seccion}"]`);
      if (activeLink) activeLink.classList.add('active');

      switch(seccion) {
        case 'inicio':
          await cargarInicio();
          break;
        case 'personal':
          await cargarPersonal();
          break;
        case 'periodos':
          await cargarPeriodos();
          break;
        case 'secciones':
          await cargarSecciones();
          break;
        case 'estudiantes':
          await cargarEstudiantes();
          break;
      }
    }

    async function cargarInicio() {
      const contentArea = document.getElementById('contentArea');
      try {
        const periodoActivo = await API.periodos.obtenerActivo();
        const usuarios = await API.usuarios.listar();
        const estudiantes = await API.estudiantes.listar();

        const docentesCount = usuarios.filter(u => u.rol === 'Docente').length;
        const adminCount = usuarios.filter(u => u.rol === 'Directivo' || u.rol === 'Superadmin').length;

        contentArea.innerHTML = `
          <div class="page-header">
            <h2><i class="bi bi-speedometer2"></i> Panel Principal</h2>
          </div>

          <div class="row">
            <div class="col-md-6 col-lg-4">
              <div class="stat-card">
                <div class="stat-number">${docentesCount}</div>
                <div class="stat-label">Docentes Registrados</div>
              </div>
            </div>
            <div class="col-md-6 col-lg-4">
              <div class="stat-card">
                <div class="stat-number">${estudiantes?.length || 0}</div>
                <div class="stat-label">Estudiantes Inscritos</div>
              </div>
            </div>
            <div class="col-md-6 col-lg-4">
              <div class="stat-card">
                <div class="stat-number">${periodoActivo ? 'Activo' : 'Cerrado'}</div>
                <div class="stat-label">Período Académico</div>
              </div>
            </div>
          </div>

          <div class="card mt-4">
            <div class="card-header" style="background: linear-gradient(135deg, var(--primary-color) 0%, #003d82 100%); color: white; border: none;">
              <h5 class="mb-0"><i class="bi bi-info-circle"></i> Información Académica</h5>
            </div>
            <div class="card-body">
              <p><strong>Período Actual:</strong> ${periodoActivo?.nombre || 'No hay período activo'}</p>
              <p><strong>Personal Administrativo:</strong> ${adminCount} personas</p>
              <p><strong>Estudiantes Activos:</strong> ${estudiantes?.length || 0}</p>
            </div>
          </div>
        `;

      } catch(error) {
        console.error('Error:', error);
        contentArea.innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
      }
    }

    async function cargarPersonal() {
      const contentArea = document.getElementById('contentArea');
      contentArea.innerHTML = `
        <div class="page-header">
          <h2><i class="bi bi-people"></i> Gestión de Personal</h2>
          <button class="btn btn-primary">+ Agregar Personal</button>
        </div>
        <div class="alert alert-info">
          <i class="bi bi-info-circle"></i> Módulo para agregar, editar y gestionar docentes y personal administrativo.
        </div>
      `;
    }

    async function cargarPeriodos() {
      const contentArea = document.getElementById('contentArea');
      try {
        const periodos = await API.periodos.listarAnios();

        contentArea.innerHTML = `
          <div class="page-header">
            <h2><i class="bi bi-calendar-event"></i> Períodos Académicos</h2>
            <button class="btn btn-primary">+ Crear Período</button>
          </div>

          <div class="table-responsive">
            <table class="table table-hover">
              <thead style="background-color: #f8f9fa;">
                <tr>
                  <th>Nombre</th>
                  <th>Inicio</th>
                  <th>Fin</th>
                  <th>Estado</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody>
                ${periodos?.map(p => `
                  <tr>
                    <td><strong>${p.nombre}</strong></td>
                    <td>${new Date(p.fecha_inicio).toLocaleDateString('es-ES')}</td>
                    <td>${new Date(p.fecha_fin).toLocaleDateString('es-ES')}</td>
                    <td><span class="badge ${p.activo ? 'bg-success' : 'bg-secondary'}">${p.activo ? 'Activo' : 'Inactivo'}</span></td>
                    <td>
                      <button class="btn btn-sm btn-outline-danger">Editar</button>
                    </td>
                  </tr>
                `).join('') || '<tr><td colspan="5" class="text-center text-muted">Sin períodos</td></tr>'}
              </tbody>
            </table>
          </div>
        `;

      } catch(error) {
        contentArea.innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
      }
    }

    async function cargarSecciones() {
      const contentArea = document.getElementById('contentArea');
      contentArea.innerHTML = `
        <div class="page-header">
          <h2><i class="bi bi-building"></i> Gestión de Secciones</h2>
          <button class="btn btn-primary">+ Crear Sección</button>
        </div>
        <div class="alert alert-info">
          <i class="bi bi-info-circle"></i> Módulo para crear, editar y gestionar secciones académicas.
        </div>
      `;
    }

    async function cargarEstudiantes() {
      const contentArea = document.getElementById('contentArea');
      contentArea.innerHTML = `
        <div class="page-header">
          <h2><i class="bi bi-person-badge"></i> Gestión de Estudiantes</h2>
          <button class="btn btn-primary">+ Inscribir Estudiante</button>
        </div>
        <div class="alert alert-info">
          <i class="bi bi-info-circle"></i> Módulo para inscribir, editar y gestionar estudiantes.
        </div>
      `;
    }
  </script>
</body>
</html>
