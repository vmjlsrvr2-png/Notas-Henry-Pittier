<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estudiante Dashboard - NOTAS Henry Pittier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../../css/styles.css" rel="stylesheet">
  <style>
    :root {
      --primary-color: #007bff;
    }

    body {
      background-color: #f5f7fa;
    }

    .navbar-custom {
      background: linear-gradient(135deg, var(--primary-color) 0%, #0056b3 100%);
    }

    .sidebar {
      background-color: #fff;
      border-right: 1px solid #e9ecef;
      position: sticky;
      top: 56px;
      min-height: calc(100vh - 56px);
    }

    .nav-item a {
      border-left: 3px solid transparent;
      padding: 12px 16px;
      text-decoration: none;
      color: #495057;
      display: block;
    }

    .nav-item a:hover,
    .nav-item a.active {
      background-color: #f8f9fa;
      border-left-color: var(--primary-color);
      color: var(--primary-color);
    }

    .main-content {
      padding: 30px;
    }

    .stat-card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
      border-left: 4px solid var(--primary-color);
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary-color);
    }

    .calificacion-item {
      background: #f8f9fa;
      border-left: 4px solid var(--primary-color);
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="javascript:location.reload()">
        <i class="bi bi-mortarboard"></i> Estudiante | NOTAS
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="javascript:irAPerfil()">
              <i class="bi bi-person-circle"></i> Mi Perfil
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="javascript:logout()">
              <i class="bi bi-box-arrow-right"></i> Salir
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid" style="margin-top: 56px;">
    <div class="row g-0">
      <!-- SIDEBAR -->
      <div class="col-md-3 d-none d-md-block">
        <div class="sidebar">
          <div class="p-3 border-bottom">
            <div style="display: flex; gap: 10px; align-items: center;">
              <div style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary-color), #0056b3); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;">E</div>
              <div>
                <div style="font-weight: 600; font-size: 0.9rem;" id="userName">Estudiante</div>
                <small class="text-muted" id="userEmail">estudiante@ejemplo.com</small>
              </div>
            </div>
          </div>
          <nav class="nav flex-column">
            <a class="nav-item nav-link active" href="javascript:cargarSeccion('inicio')">
              <i class="bi bi-speedometer2"></i> Mi Panel
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('calificaciones')">
              <i class="bi bi-graph-up"></i> Mis Calificaciones
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('perfil')">
              <i class="bi bi-person"></i> Mi Perfil
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('ayuda')">
              <i class="bi bi-question-circle"></i> Ayuda
            </a>
          </nav>
        </div>
      </div>

      <!-- MAIN CONTENT -->
      <div class="col-md-9">
        <div class="main-content">
          <div id="contentArea">
            <!-- Contenido dinámico -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/services/session.js"></script>
  <script src="../../js/services/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/utils-mejorado.js"></script>
  <script src="../../js/utils-frontend.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (!validarAcceso(['Estudiante'])) {
        return;
      }

      const sesion = sessionAPI.obtenerSesion();
      document.getElementById('userName').textContent = obtenerNombreUsuario();
      document.getElementById('userEmail').textContent = sesion?.user?.email || 'correo@ejemplo.com';

      await cargarSeccion('inicio');
    });

    async function cargarSeccion(seccion) {
      const contentArea = document.getElementById('contentArea');
      contentArea.innerHTML = '<div class="text-center"><span class="spinner-border"></span> Cargando...</div>';

      try {
        switch(seccion) {
          case 'inicio':
            await cargarInicio();
            break;
          case 'calificaciones':
            await cargarCalificaciones();
            break;
          case 'perfil':
            await cargarPerfil();
            break;
          case 'ayuda':
            await cargarAyuda();
            break;
        }
      } catch(e) {
        contentArea.innerHTML = `<div class="alert alert-danger">Error: ${e.message}</div>`;
      }
    }

    async function cargarInicio() {
      const sesion = sessionAPI.obtenerSesion();

      try {
        const { data: inscripciones, error } = await supabase
          .from('inscripciones')
          .select('seccion_id, secciones:seccion_id(grado, letra), estado')
          .eq('estudiante_id', sesion?.user?.id)
          .limit(1)
          .single();

        const html = `
          <h1 class="mb-4"><i class="bi bi-speedometer2"></i> Mi Panel</h1>
          
          <div class="row">
            <div class="col-md-6">
              <div class="stat-card">
                <div class="stat-number">${inscripciones?.secciones?.grado || '-'}°</div>
                <p class="text-muted mb-0">Mi Sección</p>
                <small>${inscripciones?.secciones?.letra || 'Sin sección'}</small>
              </div>
            </div>
            <div class="col-md-6">
              <div class="stat-card">
                <div class="stat-number" style="color: ${inscripciones?.estado === 'activo' ? '#28a745' : '#dc3545'}">
                  ${(inscripciones?.estado || 'desconocido').toUpperCase()}
                </div>
                <p class="text-muted mb-0">Estado</p>
                <small>En el sistema</small>
              </div>
            </div>
          </div>

          <div class="card mt-4">
            <div class="card-header bg-light">
              <h5 class="mb-0"><i class="bi bi-lightbulb"></i> Acciones Rápidas</h5>
            </div>
            <div class="card-body">
              <div class="list-group">
                <a href="javascript:cargarSeccion('calificaciones')" class="list-group-item list-group-item-action">
                  <h6 class="mb-1"><i class="bi bi-graph-up"></i> Ver Mis Calificaciones</h6>
                  <small class="text-muted">Consulta tus notas por materia y lapso</small>
                </a>
              </div>
            </div>
          </div>
        `;

        document.getElementById('contentArea').innerHTML = html;
      } catch(e) {
        document.getElementById('contentArea').innerHTML = `<div class="alert alert-danger">Error: ${e.message}</div>`;
      }
    }

    async function cargarCalificaciones() {
      mostrarCargando(true, "Cargando calificaciones...");

      try {
        const sesion = sessionAPI.obtenerSesion();
        const { data: notas } = await supabase
          .from('calificaciones')
          .select('id, nota, materia_id, lapso_id, materias:materia_id(nombre), lapsos:lapso_id(numero)')
          .eq('estudiante_id', sesion?.user?.id)
          .order('lapso_id', { ascending: true });

        let html = `<h2 class="mb-4"><i class="bi bi-graph-up"></i> Mis Calificaciones</h2>`;

        if (!notas || notas.length === 0) {
          html += '<div class="alert alert-info">No hay calificaciones registradas aún</div>';
        } else {
          const porLapso = {};
          notas.forEach(n => {
            if (!porLapso[n.lapso_id]) porLapso[n.lapso_id] = [];
            porLapso[n.lapso_id].push(n);
          });

          for (const [lapsoId, notasLapso] of Object.entries(porLapso)) {
            html += `<div class="card mb-3"><div class="card-header"><strong>Lapso ${notasLapso[0]?.lapsos?.numero || lapsoId}</strong></div><div class="card-body">`;
            
            notasLapso.forEach(n => {
              html += `
                <div class="calificacion-item">
                  <div class="row">
                    <div class="col-md-8"><h6 class="mb-0">${n.materias?.nombre || 'Materia desconocida'}</h6></div>
                    <div class="col-md-4 text-end"><span class="badge bg-${n.nota >= 10 ? 'success' : n.nota >= 8 ? 'warning' : 'danger'}">${n.nota}/20</span></div>
                  </div>
                </div>
              `;
            });

            html += '</div></div>';
          }
        }

        document.getElementById('contentArea').innerHTML = html;
        mostrarCargando(false);
      } catch(e) {
        mostrarError(e.message);
        mostrarCargando(false);
      }
    }

    async function cargarPerfil() {
      const sesion = sessionAPI.obtenerSesion();
      const html = `
        <h2 class="mb-4"><i class="bi bi-person"></i> Mi Perfil</h2>
        <div class="card">
          <div class="card-body">
            <div class="row mb-3">
              <div class="col-md-6"><label class="form-label"><strong>Nombre:</strong></label><p>${sesion?.user?.user_metadata?.nombres || 'No especificado'}</p></div>
              <div class="col-md-6"><label class="form-label"><strong>Apellido:</strong></label><p>${sesion?.user?.user_metadata?.apellidos || 'No especificado'}</p></div>
            </div>
            <div class="row mb-3">
              <div class="col-md-6"><label class="form-label"><strong>Email:</strong></label><p>${sesion?.user?.email || 'No especificado'}</p></div>
              <div class="col-md-6"><label class="form-label"><strong>Cédula:</strong></label><p>${sesion?.user?.user_metadata?.cedula || 'No especificado'}</p></div>
            </div>
          </div>
        </div>
      `;
      document.getElementById('contentArea').innerHTML = html;
      mostrarCargando(false);
    }

    async function cargarAyuda() {
      const html = `
        <h2 class="mb-4"><i class="bi bi-question-circle"></i> Centro de Ayuda</h2>
        <div class="accordion" id="accordion">
          <div class="accordion-item">
            <h2 class="accordion-header"><button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#faq1">¿Cómo veo mis calificaciones?</button></h2>
            <div id="faq1" class="accordion-collapse collapse show" data-bs-parent="#accordion"><div class="accordion-body">Haz clic en "Mis Calificaciones" para ver todas tus notas organizadas por lapso.</div></div>
          </div>
        </div>
      `;
      document.getElementById('contentArea').innerHTML = html;
      mostrarCargando(false);
    }

    function irAPerfil() {
      window.location.href = '/pages/perfil.html';
    }
  </script>
</body>
</html>
