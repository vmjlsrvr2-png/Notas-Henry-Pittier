<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superadmin Dashboard - NOTAS Henry Pittier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../../css/styles.css" rel="stylesheet">
  <style>
    :root {
      --primary-color: #c41e3a;
      --secondary-color: #6c757d;
      --success-color: #28a745;
    }

    body {
      background-color: #f5f7fa;
    }

    .navbar-custom {
      background: linear-gradient(135deg, var(--primary-color) 0%, #8b0000 100%);
    }

    .sidebar {
      background-color: #fff;
      border-right: 1px solid #e9ecef;
      position: sticky;
      top: 56px;
      min-height: calc(100vh - 56px);
    }

    .nav-item a {
      border-left: 3px solid transparent;
      padding: 12px 16px;
    }

    .nav-item a:hover,
    .nav-item a.active {
      background-color: #f8f9fa;
      border-left-color: var(--primary-color);
      color: var(--primary-color);
    }

    .main-content {
      padding: 30px;
    }

    .stat-card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
      border-left: 4px solid var(--primary-color);
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary-color);
    }

    .stat-label {
      color: #6c757d;
      font-size: 0.9rem;
      margin-top: 5px;
    }

    .modal-custom .modal-header {
      background: linear-gradient(135deg, var(--primary-color) 0%, #8b0000 100%);
      color: white;
      border: none;
    }

    .form-label {
      font-weight: 500;
      color: #212529;
    }

    .table-responsive {
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .btn-action {
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    .badge-rol {
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 12px;
    }

    .estado-activo {
      background-color: #d4edda;
      color: #155724;
    }

    .estado-inactivo {
      background-color: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="javascript:location.reload()">
        <i class="bi bi-shield-lock"></i> Superadmin | NOTAS
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="javascript:nav.irAPerfil()">
              <i class="bi bi-person-circle"></i> Mi Perfil
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="javascript:nav.logout()">
              <i class="bi bi-box-arrow-right"></i> Salir
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid" style="margin-top: 56px;">
    <div class="row g-0">
      <!-- SIDEBAR -->
      <div class="col-md-3 d-none d-md-block">
        <div class="sidebar">
          <div class="p-3 border-bottom">
            <div style="display: flex; gap: 10px; align-items: center;">
              <div style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary-color), #8b0000); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;" id="userInitials">S</div>
              <div>
                <div style="font-weight: 600; font-size: 0.9rem;" id="userName">Superadmin</div>
                <small class="text-muted" id="userEmail">admin@example.com</small>
              </div>
            </div>
          </div>
          <nav class="nav flex-column">
            <a class="nav-item nav-link active" href="javascript:cargarSeccion('inicio')">
              <i class="bi bi-speedometer2"></i> Panel Principal
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('usuarios')">
              <i class="bi bi-people"></i> Gestión de Usuarios
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('roles')">
              <i class="bi bi-shield-check"></i> Asignación de Roles
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('auditoria')">
              <i class="bi bi-file-earmark-text"></i> Auditoría
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('sistema')">
              <i class="bi bi-gear"></i> Configuración del Sistema
            </a>
          </nav>
        </div>
      </div>

      <!-- MAIN CONTENT -->
      <div class="col-md-9 col-lg-9">
        <div class="main-content">
          <div id="contentArea">
            <!-- Contenido dinámico -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL CREAR/EDITAR USUARIO -->
  <div class="modal fade modal-custom" id="modalUsuario" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalUsuarioTitle">Crear Usuario</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="formUsuario">
            <div class="mb-3">
              <label class="form-label">Email *</label>
              <input type="email" class="form-control" id="usuarioEmail" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Nombre *</label>
              <input type="text" class="form-control" id="usuarioNombre" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Apellido *</label>
              <input type="text" class="form-control" id="usuarioApellido" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Cédula *</label>
              <input type="text" class="form-control" id="usuarioCedula" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Rol *</label>
              <select class="form-select" id="usuarioRol" required>
                <option value="">-- Seleccionar Rol --</option>
                <option value="Docente">Docente</option>
                <option value="Control_estudios">Control de Estudios</option>
                <option value="Evaluacion_docente">Evaluación Docente</option>
                <option value="Directivo">Directivo</option>
                <option value="Superadmin">Superadmin</option>
              </select>
            </div>
            <div class="mb-3" id="contEspecialidad" style="display:none;">
              <label class="form-label">Especialidad</label>
              <input type="text" class="form-control" id="usuarioEspecialidad">
            </div>
            <div class="mb-3" id="contCargo" style="display:none;">
              <label class="form-label">Cargo</label>
              <input type="text" class="form-control" id="usuarioCargo">
            </div>
            <div class="mb-3">
              <label class="form-label">Contraseña *</label>
              <input type="password" class="form-control" id="usuarioPassword" required>
              <small class="text-muted">Mínimo 8 caracteres</small>
            </div>
            <div id="alertaFormUsuario"></div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-danger">Crear Usuario</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL ASIGNAR ROL -->
  <div class="modal fade" id="modalAsignarRol" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header" style="background: linear-gradient(135deg, var(--primary-color) 0%, #8b0000 100%); color: white;">
          <h5 class="modal-title">Asignar Nuevo Rol</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <input type="text" class="form-control" id="rolUsuario" disabled>
          </div>
          <div class="mb-3">
            <label class="form-label">Nuevo Rol *</label>
            <select class="form-select" id="nuevoRol" required>
              <option value="">-- Seleccionar --</option>
              <option value="Docente">Docente</option>
              <option value="Control_estudios">Control de Estudios</option>
              <option value="Evaluacion_docente">Evaluación Docente</option>
              <option value="Directivo">Directivo</option>
              <option value="Superadmin">Superadmin</option>
            </select>
          </div>
          <div id="alertaAsignarRol"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button id="btnAsignarRol" type="button" class="btn btn-danger">Asignar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/services/session.js"></script>
  <script src="../../js/services/api.js"></script>
  <script>
    let usuarioEditando = null;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!sessionAPI.estaAutenticado()) {
        window.location.href = '/index.html';
        return;
      }

      const rol = sessionAPI.obtenerRolPrincipal();
      if (rol !== 'Superadmin') {
        window.location.href = '/index.html';
        return;
      }

      const usuario = sessionAPI.obtenerUsuario();
      document.getElementById('userName').textContent = `${usuario.nombre} ${usuario.apellido}`;
      document.getElementById('userEmail').textContent = usuario.email;

      // Cargar panel principal por defecto
      cargarSeccion('inicio');

      // Event listeners
      document.getElementById('usuarioRol').addEventListener('change', (e) => {
        const rol = e.target.value;
        document.getElementById('contEspecialidad').style.display = rol === 'Docente' ? 'block' : 'none';
        document.getElementById('contCargo').style.display = rol === 'Directivo' ? 'block' : 'none';
      });

      document.getElementById('formUsuario').addEventListener('submit', crearUsuario);
    });

    async function cargarSeccion(seccion) {
      const contentArea = document.getElementById('contentArea');
      
      // Actualizar activo en sidebar
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
      });
      const activeLink = document.querySelector(`.nav-item[href*="${seccion}"]`);
      if (activeLink) activeLink.classList.add('active');

      switch(seccion) {
        case 'inicio':
          await cargarInicio();
          break;
        case 'usuarios':
          await cargarUsuarios();
          break;
        case 'roles':
          await cargarRoles();
          break;
        case 'auditoria':
          await cargarAuditoria();
          break;
        case 'sistema':
          await cargarSistema();
          break;
      }
    }

    async function cargarInicio() {
      const contentArea = document.getElementById('contentArea');
      try {
        const usuarios = await API.usuarios.listar();
        const periodos = await API.periodos.listarAnios();
        
        const usuariosActivos = usuarios.filter(u => !u.deshabilitado).length;
        const docentesCount = usuarios.filter(u => u.rol === 'Docente').length;
        const estudiantesCount = usuarios.filter(u => u.rol === 'Estudiante').length;

        contentArea.innerHTML = `
          <div class="page-header">
            <h2><i class="bi bi-speedometer2"></i> Panel Principal</h2>
          </div>

          <div class="row">
            <div class="col-md-6 col-lg-4">
              <div class="stat-card">
                <div class="stat-number">${usuariosActivos}</div>
                <div class="stat-label">Usuarios Activos</div>
              </div>
            </div>
            <div class="col-md-6 col-lg-4">
              <div class="stat-card">
                <div class="stat-number">${docentesCount}</div>
                <div class="stat-label">Docentes</div>
              </div>
            </div>
            <div class="col-md-6 col-lg-4">
              <div class="stat-card">
                <div class="stat-number">${estudiantesCount}</div>
                <div class="stat-label">Estudiantes</div>
              </div>
            </div>
          </div>

          <div class="card mt-4">
            <div class="card-header" style="background: linear-gradient(135deg, var(--primary-color) 0%, #8b0000 100%); color: white; border: none;">
              <h5 class="mb-0"><i class="bi bi-calendar-event"></i> Períodos Académicos Activos</h5>
            </div>
            <div class="card-body">
              <div id="periodosContent">
                <p class="text-muted">Cargando...</p>
              </div>
            </div>
          </div>
        `;

        // Cargar períodos
        const periodosHTML = periodos.map(p => `
          <div class="alert alert-info mb-2">
            <strong>${p.nombre}</strong> - ${p.activo ? '<span class="badge bg-success">Activo</span>' : '<span class="badge bg-secondary">Inactivo</span>'}
          </div>
        `).join('');

        document.getElementById('periodosContent').innerHTML = periodosHTML || '<p class="text-muted">No hay períodos registrados</p>';

      } catch(error) {
        console.error('Error cargando inicio:', error);
        contentArea.innerHTML = `<div class="alert alert-danger">Error al cargar datos: ${error.message}</div>`;
      }
    }

    async function cargarUsuarios() {
      const contentArea = document.getElementById('contentArea');
      try {
        const usuarios = await API.usuarios.listar();

        contentArea.innerHTML = `
          <div class="page-header">
            <h2><i class="bi bi-people"></i> Gestión de Usuarios</h2>
            <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#modalUsuario">
              <i class="bi bi-plus-circle"></i> Crear Usuario
            </button>
          </div>

          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead style="background-color: #f8f9fa;">
                <tr>
                  <th>Email</th>
                  <th>Nombre</th>
                  <th>Rol</th>
                  <th>Cédula</th>
                  <th>Estado</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="usuariosTable">
                <tr><td colspan="6" class="text-center text-muted">Cargando usuarios...</td></tr>
              </tbody>
            </table>
          </div>
        `;

        const tabla = document.getElementById('usuariosTable');
        if (usuarios && usuarios.length > 0) {
          tabla.innerHTML = usuarios.map(u => `
            <tr>
              <td><strong>${u.email}</strong></td>
          <td>${u.nombre || ''} ${u.apellido || ''}</td>
          <td><span class="badge badge-rol" style="background-color: #e3f2fd; color: #0056b3;">${u.rol || 'Sin rol'}</span></td>
          <td>${u.cedula || '-'}</td>
              <td>
                <span class="badge ${u.deshabilitado ? 'estado-inactivo' : 'estado-activo'}">
                  ${u.deshabilitado ? 'Inactivo' : 'Activo'}
                </span>
              </td>
              <td>
                <button class="btn btn-sm btn-primary btn-action" onclick="editarUsuario('${u.id}', '${u.email}')">
                  <i class="bi bi-pencil"></i> Editar
                </button>
                <button class="btn btn-sm ${u.deshabilitado ? 'btn-success' : 'btn-warning'} btn-action" 
                  onclick="toggleUsuario('${u.id}', ${u.deshabilitado})">
                  <i class="bi ${u.deshabilitado ? 'bi-check-circle' : 'bi-x-circle'}"></i> ${u.deshabilitado ? 'Habilitar' : 'Deshabilitar'}
                </button>
              </td>
            </tr>
          `).join('');
        } else {
          tabla.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No hay usuarios</td></tr>';
        }

      } catch(error) {
        console.error('Error cargando usuarios:', error);
        contentArea.innerHTML = `<div class="alert alert-danger">Error al cargar usuarios: ${error.message}</div>`;
      }
    }

    async function cargarRoles() {
      const contentArea = document.getElementById('contentArea');
      try {
        const usuarios = await API.usuarios.listar();

        contentArea.innerHTML = `
          <div class="page-header">
            <h2><i class="bi bi-shield-check"></i> Asignación de Roles</h2>
          </div>

          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead style="background-color: #f8f9fa;">
                <tr>
                  <th>Usuario</th>
                  <th>Email</th>
                  <th>Rol Actual</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="rolesTable">
                <tr><td colspan="4" class="text-center text-muted">Cargando...</td></tr>
              </tbody>
            </table>
          </div>
        `;

        const tabla = document.getElementById('rolesTable');
        if (usuarios && usuarios.length > 0) {
          tabla.innerHTML = usuarios.map(u => `
            <tr>
              <td><strong>${u.nombre || ''} ${u.apellido || ''}</strong></td>
              <td>${u.email}</td>
              <td><span class="badge" style="background-color: #e3f2fd; color: #0056b3;">${u.rol || 'Sin rol'}</span></td>
              <td>
                <button class="btn btn-sm btn-outline-danger btn-action" onclick="abrirModalAsignarRol('${u.id}', '${u.email}')">
                  <i class="bi bi-gear"></i> Cambiar Rol
                </button>
              </td>
            </tr>
          `).join('');
        } else {
          tabla.innerHTML = '<tr><td colspan="4" class="text-center text-muted">No hay usuarios</td></tr>';
        }

      } catch(error) {
        console.error('Error:', error);
        contentArea.innerHTML = `<div class="alert alert-danger">Error: ${error.message}</div>`;
      }
    }

    async function cargarAuditoria() {
      const contentArea = document.getElementById('contentArea');
      contentArea.innerHTML = `
        <div class="page-header">
          <h2><i class="bi bi-file-earmark-text"></i> Auditoría del Sistema</h2>
        </div>
        <div class="alert alert-info">
          <i class="bi bi-info-circle"></i> Consulta el historial de cambios críticos del sistema. Esta vista solo está disponible para Superadmin.
        </div>

        <div class="card mb-4">
          <div class="card-body">
            <div class="row g-3">
              <div class="col-md-3">
                <label class="form-label">Tabla</label>
                <input type="text" id="auditTabla" class="form-control" placeholder="ej. calificaciones">
              </div>
              <div class="col-md-3">
                <label class="form-label">Operación</label>
                <select id="auditOperacion" class="form-select">
                  <option value="">Todas</option>
                  <option value="INSERT">INSERT</option>
                  <option value="UPDATE">UPDATE</option>
                  <option value="DELETE">DELETE</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Usuario</label>
                <input type="text" id="auditUsuario" class="form-control" placeholder="ID de usuario">
              </div>
              <div class="col-md-3">
                <label class="form-label">Registro</label>
                <input type="text" id="auditRegistro" class="form-control" placeholder="ID del registro">
              </div>
            </div>
            <div class="row g-3 mt-1">
              <div class="col-md-3">
                <label class="form-label">Límite</label>
                <input type="number" id="auditLimit" class="form-control" value="100" min="1" max="500">
              </div>
              <div class="col-md-9 d-flex align-items-end">
                <button class="btn btn-danger" onclick="consultarAuditoria()">
                  <i class="bi bi-search"></i> Consultar
                </button>
              </div>
            </div>
          </div>
        </div>

        <div id="auditoriaResultados"></div>
      `;

      await consultarAuditoria();
    }

    async function consultarAuditoria() {
      const resultados = document.getElementById('auditoriaResultados');
      const tabla = document.getElementById('auditTabla').value.trim();
      const operacion = document.getElementById('auditOperacion').value.trim();
      const usuario = document.getElementById('auditUsuario').value.trim();
      const registro = document.getElementById('auditRegistro').value.trim();
      const limit = document.getElementById('auditLimit').value.trim();

      resultados.innerHTML = '<div class="text-muted">Consultando auditoría...</div>';

      try {
        const payload = {};
        if (tabla) payload.tabla = tabla;
        if (operacion) payload.operacion = operacion;
        if (usuario) payload.usuario_id = usuario;
        if (registro) payload.registro_id = registro;
        if (limit) payload.limit = Number(limit);

        const data = await API.usuarios.consultarAuditoria(payload);
        const registros = Array.isArray(data?.registros) ? data.registros : [];

        if (!registros.length) {
          resultados.innerHTML = '<div class="alert alert-info">No se encontraron registros de auditoría.</div>';
          return;
        }

        resultados.innerHTML = `
          <div class="alert alert-secondary mb-3">
            <strong>${data?.conteo ?? registros.length}</strong> registros encontrados.
          </div>
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead style="background-color: #f8f9fa;">
                <tr>
                  <th>Fecha</th>
                  <th>Tabla</th>
                  <th>Operación</th>
                  <th>Registro</th>
                  <th>Usuario</th>
                  <th>Cambios</th>
                </tr>
              </thead>
              <tbody>
                ${registros.map(item => {
                  const perfiles = item?.perfiles || {};
                  const usuarioNombre = [perfiles?.nombres, perfiles?.apellidos].filter(Boolean).join(' ') || perfiles?.username || 'Sistema';
                  const cambios = item?.cambios ? JSON.stringify(item.cambios, null, 2) : '-';
                  return `
                    <tr>
                      <td>${item?.created_at ? new Date(item.created_at).toLocaleString('es-VE') : '-'}</td>
                      <td><strong>${item?.tabla || '-'}</strong></td>
                      <td><span class="badge ${item?.operacion === 'UPDATE' ? 'bg-warning text-dark' : item?.operacion === 'DELETE' ? 'bg-danger' : 'bg-success'}">${item?.operacion || '-'}</span></td>
                      <td>${item?.registro_id || '-'}</td>
                      <td>${usuarioNombre}</td>
                      <td><pre class="mb-0" style="white-space: pre-wrap; font-size: 0.8rem; max-width: 320px;">${cambios}</pre></td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
      } catch (error) {
        console.error('Error consultando auditoría:', error);
        resultados.innerHTML = `<div class="alert alert-danger">Error al consultar auditoría: ${error.message}</div>`;
      }
    }

    async function cargarSistema() {
      const contentArea = document.getElementById('contentArea');
      contentArea.innerHTML = `
        <div class="page-header">
          <h2><i class="bi bi-gear"></i> Configuración del Sistema</h2>
        </div>
        <div class="alert alert-info">
          <i class="bi bi-info-circle"></i> Módulo de configuración - Parámetros y configuración general del sistema.
        </div>
      `;
    }

    async function crearUsuario(e) {
      e.preventDefault();
      const alerta = document.getElementById('alertaFormUsuario');
      alerta.innerHTML = '';

      try {
        const email = document.getElementById('usuarioEmail').value;
        const password = document.getElementById('usuarioPassword').value;
        const nombre = document.getElementById('usuarioNombre').value;
        const apellido = document.getElementById('usuarioApellido').value;
        const cedula = document.getElementById('usuarioCedula').value;
        const rol = document.getElementById('usuarioRol').value;

        if (password.length < 8) {
          alerta.innerHTML = '<div class="alert alert-danger">La contraseña debe tener mínimo 8 caracteres</div>';
          return;
        }

        const metadata = {
          rol,
          nombre,
          apellido,
          cedula,
        };

        if (rol === 'Docente') {
          metadata.especialidad = document.getElementById('usuarioEspecialidad').value;
        }
        if (rol === 'Directivo') {
          metadata.cargo = document.getElementById('usuarioCargo').value;
        }

        const resultado = await API.usuarios.crear(email, password, metadata);
        
        alerta.innerHTML = '<div class="alert alert-success"><i class="bi bi-check-circle"></i> Usuario creado exitosamente</div>';
        setTimeout(() => {
          bootstrap.Modal.getInstance(document.getElementById('modalUsuario')).hide();
          document.getElementById('formUsuario').reset();
          cargarUsuarios();
        }, 1500);

      } catch(error) {
        alerta.innerHTML = `<div class="alert alert-danger"><i class="bi bi-exclamation-triangle"></i> Error: ${error.message}</div>`;
      }
    }

    function editarUsuario(id, email) {
      usuarioEditando = id;
      document.getElementById('modalUsuarioTitle').textContent = 'Editar Usuario';
      document.getElementById('usuarioEmail').value = email;
      document.getElementById('usuarioEmail').disabled = true;
      document.getElementById('usuarioPassword').required = false;
      // Cargar y mostrar datos del usuario...
      new bootstrap.Modal(document.getElementById('modalUsuario')).show();
    }

    async function toggleUsuario(id, esDeshabilitado) {
      try {
        if (esDeshabilitado) {
          await API.usuarios.habilitar(id);
        } else {
          await API.usuarios.deshabilitar(id);
        }
        cargarUsuarios();
      } catch(error) {
        alert(`Error: ${error.message}`);
      }
    }

    function abrirModalAsignarRol(userId, email) {
      document.getElementById('rolUsuario').value = email;
      new bootstrap.Modal(document.getElementById('modalAsignarRol')).show();
    }

    async function guardarAsignacionRol() {
      // Implementar cambio de rol
      alert('Función en desarrollo');
    }

    // Attach button wrapper to prevent doble envío
    setTimeout(() => {
      const btn = document.getElementById('btnAsignarRol');
      if (btn) btn.addEventListener('click', async () => await runAsyncWithButton(btn, guardarAsignacionRol, 'Asignando...'));
    }, 50);
  </script>
