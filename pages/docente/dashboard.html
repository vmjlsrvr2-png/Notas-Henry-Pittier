<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docente Dashboard - NOTAS Henry Pittier</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../../css/styles.css" rel="stylesheet">
  <style>
    :root {
      --primary-color: #28a745;
      --secondary-color: #6c757d;
    }

    body {
      background-color: #f5f7fa;
    }

    .navbar-custom {
      background: linear-gradient(135deg, var(--primary-color) 0%, #1e7e34 100%);
    }

    .sidebar {
      background-color: #fff;
      border-right: 1px solid #e9ecef;
      position: sticky;
      top: 56px;
      min-height: calc(100vh - 56px);
    }

    .nav-item a {
      border-left: 3px solid transparent;
      padding: 12px 16px;
      text-decoration: none;
      color: #495057;
      display: block;
    }

    .nav-item a:hover,
    .nav-item a.active {
      background-color: #f8f9fa;
      border-left-color: var(--primary-color);
      color: var(--primary-color);
    }

    .main-content {
      padding: 30px;
    }

    .stat-card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
      border-left: 4px solid var(--primary-color);
    }

    .stat-number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary-color);
    }

    .card-seccion {
      border-left: 4px solid var(--primary-color);
      cursor: pointer;
      transition: all 0.3s;
    }

    .card-seccion:hover {
      box-shadow: 0 4px 12px rgba(40, 167, 69, 0.2);
    }

    .evaluacion-item {
      background: #f8f9fa;
      border-left: 4px solid var(--primary-color);
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .evaluacion-item:hover {
      background: #e8f5e9;
    }

    .evaluacion-item.activa {
      background: #e8f5e9;
      border-left-color: #1e7e34;
    }
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="javascript:location.reload()">
        <i class="bi bi-person-workspace"></i> Docente | NOTAS
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="javascript:irAPerfil()">
              <i class="bi bi-person-circle"></i> Mi Perfil
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="javascript:logout()">
              <i class="bi bi-box-arrow-right"></i> Salir
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid" style="margin-top: 56px;">
    <div class="row g-0">
      <!-- SIDEBAR -->
      <div class="col-md-3 d-none d-md-block">
        <div class="sidebar">
          <div class="p-3 border-bottom">
            <div style="display: flex; gap: 10px; align-items: center;">
              <div style="width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary-color), #1e7e34); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700;">D</div>
              <div>
                <div style="font-weight: 600; font-size: 0.9rem;" id="userName">Docente</div>
                <small class="text-muted" id="userEmail">docente@ejemplo.com</small>
              </div>
            </div>
          </div>
          <nav class="nav flex-column">
            <a class="nav-item nav-link active" href="javascript:cargarSeccion('inicio')">
              <i class="bi bi-speedometer2"></i> Panel Principal
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('misecciones')">
              <i class="bi bi-building"></i> Mis Secciones
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('cargarnotas')">
              <i class="bi bi-pencil-square"></i> Cargar Notas
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('historial')">
              <i class="bi bi-clock-history"></i> Historial Notas
            </a>
            <a class="nav-item nav-link" href="javascript:cargarSeccion('asesorias')">
              <i class="bi bi-chat-dots"></i> Centro de Ayuda
            </a>
          </nav>
        </div>
      </div>

      <!-- MAIN CONTENT -->
      <div class="col-md-9">
        <div class="main-content">
          <div id="contentArea">
            <!-- Contenido dinámico -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/services/session.js"></script>
  <script src="../../js/services/api.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/utils-mejorado.js"></script>
  <script src="../../js/utils-frontend.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
